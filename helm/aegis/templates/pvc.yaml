apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "aegis.fullname" . }}-state
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.state.size }}
  {{- with .Values.persistence.state.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "aegis.fullname" . }}-workspace
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.workspace.size }}
  {{- with .Values.persistence.workspace.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
