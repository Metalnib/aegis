apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegis.fullname" . }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  # SQLite is single-writer; never run concurrent replicas.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "aegis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aegis.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.secrets }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: aegis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: AEGIS_CONFIG
              value: /opt/aegis/aegis.config.js
            {{- range $k, $_ := .Values.secrets }}
            - name: {{ $k | snakecase | upper }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegis.fullname" $ }}-secrets
                  key: {{ $k }}
            {{- end }}
            {{- range $k, $v := .Values.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          # startupProbe absorbs the Synopsis cold-scan time. While it is
          # running, kubelet does not enforce livenessProbe failures, so a
          # slow boot does not flap the pod. Once /healthz returns 200,
          # startupProbe succeeds and liveness/readiness take over.
          # See ADR 0016.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /opt/aegis/aegis.config.js
              subPath: aegis.config.js
            {{- if .Values.soul }}
            - name: config
              mountPath: /opt/aegis/SOUL.md
              subPath: SOUL.md
            {{- end }}
            - name: state
              mountPath: /var/lib/aegis
            - name: workspace
              mountPath: /workspace
            - name: run
              mountPath: /var/run/aegis
      volumes:
        - name: config
          configMap:
            name: {{ include "aegis.fullname" . }}-config
        - name: state
          persistentVolumeClaim:
            claimName: {{ include "aegis.fullname" . }}-state
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "aegis.fullname" . }}-workspace
        - name: run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
